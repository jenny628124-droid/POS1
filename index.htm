<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>簡易掃碼銷售系統</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        input { padding: 10px; width: 300px; font-size: 1.2rem; border: 2px solid #ccc; border-radius: 5px; }
        /* 當輸入框被選取時變色，方便確認狀態 */
        input:focus { border-color: #4CAF50; outline: none; box-shadow: 0 0 5px #4CAF50; }
        .info { margin-top: 30px; border: 1px solid #ccc; padding: 20px; display: inline-block; min-width: 300px; border-radius: 10px; }
        .status { color: green; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>商品掃描結帳</h1>
    <p>系統已設定為「自動對焦」，請直接掃描條碼</p>
    
    <input type="text" id="barcodeInput" autofocus autocomplete="off">

    <div class="info">
        <p>商品名稱：<span id="name">等待掃描...</span></p>
        <p>商品單價：$<span id="price">0</span></p>
        <div id="statusMsg" class="status"></div>
    </div>

    <script>
        const productList = {
            "4710123456789": { name: "可口可樂", price: 25 },
            "4710987654321": { name: "御飯糰", price: 35 },
            "12345678": { name: "測試商品", price: 100 }
        };

        const input = document.getElementById('barcodeInput');
        const statusMsg = document.getElementById('statusMsg');

        // --- 自動聚焦邏輯開始 ---
        
        // 1. 頁面載入後自動聚焦
        window.onload = () => input.focus();

        // 2. 當使用者點擊頁面任何地方，自動回到輸入框
        document.addEventListener('click', () => {
            input.focus();
        });

        // 3. 當輸入框失去焦點時，強迫它在 10 毫秒後重新聚焦
        input.addEventListener('blur', () => {
            setTimeout(() => {
                input.focus();
            }, 10);
        });

        // --- 自動聚焦邏輯結束 ---

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const code = input.value.trim(); // 去除前後空白
                const product = productList[code];

                if (product) {
                    document.getElementById('name').innerText = product.name;
                    document.getElementById('price').innerText = product.price;
                    statusMsg.innerText = "正在傳送紀錄...";
                    saveToGoogleSheet(code, product.name, product.price);
                } else {
                    statusMsg.innerText = "❌ 找不到此商品條碼";
                    statusMsg.style.color = "red";
                }
                input.value = ''; // 清空輸入框
            }
        });

        function saveToGoogleSheet(id, name, price) {
            const formID = "1FAIpQLSe-CKAfRZk5LZVxqsUaWSFGVTJw6bCwT-mXoknqk8jF--zFCA"; 
            const entryID_code = "entry.1009148026";
            const entryID_name = "entry.638496046";
            const entryID_price = "entry.103410697";

            const baseURL = `https://docs.google.com/forms/d/e/${formID}/formResponse`;
            const submitURL = `${baseURL}?${entryID_code}=${id}&${entryID_name}=${encodeURIComponent(name)}&${entryID_price}=${price}`;

            fetch(submitURL, {
                method: 'POST',
                mode: 'no-cors'
            })
            .then(() => {
                statusMsg.innerText = "✅ 銷售紀錄已存至後台";
                statusMsg.style.color = "green";
            })
            .catch(err => {
                statusMsg.innerText = "⚠️ 紀錄失敗";
                console.error(err);
            });
        }
    </script>
</body>
</html>
